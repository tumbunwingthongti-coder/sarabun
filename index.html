    // --- Firebase Configuration ---
    const firebaseConfig = {

    const fallbackUsers = [

      { id: 'u1', username: 'jaokana', password: '123', role: 'temple', temple: 'สำนักงานเจ้าคณะตำบล', name: 'พระครูสิริฯ', position: 'เจ้าคณะตำบล' },
      { id: 'u2', username: 'wat1', password: '123', role: 'temple', temple: 'วัดหนองชะอม', name: 'พระมหา ก.', position: 'เลขานุการวัด' },
      { id: 'u3', username: 'wat2', password: '123', role: 'temple', temple: 'วัดป่าเลไลยก์', name: 'พระอธิการ ข.', position: 'เจ้าอาวาส' }

    const fallbackDocuments = [
      {

        date: '2026-03-10', status: 'completed', attachment: 'invitation.pdf', note: 'ประชุมวันที่ 20 มีนาคม เวลา 13.00 น. ณ วัดหนองชะอม'
      },
      {

        date: '2026-03-12', status: 'pending', attachment: 'report2569.pdf', note: 'จัดส่งตามกำหนดการ'
      },
      {

        date: '2026-03-14', status: 'processing', attachment: 'announce.pdf', note: 'แจ้งเฉพาะวัดที่เข้าร่วมโครงการ'
      }
    ];

    const fallbackNotifications = [
      { id: 'n1', target: 'all', message: 'ประกาศ: ขอเชิญประชุมพระสังฆาธิการระดับตำบล', date: '2026-03-10', isRead: false },
      { id: 'n2', target: 'วัดป่าเลไลยก์', message: 'มีหนังสือส่งถึงวัดท่าน: มติมหาเถรสมาคม...', date: '2026-03-14', isRead: false }
    ];

    // --- Barcode Component ---
    const SvgBarcode = ({ value, width = 200, height = 50 }) => {
      const bars = useMemo(() => {
        let result = [];
        const text = `*${value}*`;
        for (let i = 0; i < text.length; i++) {
          let charCode = text.charCodeAt(i);
          for (let j = 0; j < 6; j++) {
            let isWide = (charCode & (1 << j)) !== 0;
            result.push({ width: isWide ? 3 : 1, isBlack: j % 2 === 0 });
          }
          result.push({ width: 1, isBlack: false });
        }
        return result;
      }, [value]);

      const totalWidth = bars.reduce((sum, bar) => sum + bar.width, 0);
      let currentX = 0;

      return (
        <div className="flex flex-col items-center justify-center p-3 bg-white rounded-lg border border-slate-200 shadow-sm">
          <svg viewBox={`0 0 ${totalWidth} 40`} width={width} height={height} className="block">
            {bars.map((bar, index) => {
              const rect = bar.isBlack ? (
                <rect key={index} x={currentX} y="0" width={bar.width} height="40" fill="#1e293b" />
              ) : null;
              currentX += bar.width;
              return rect;
            })}
          </svg>
          <span className="mt-2 text-xs font-mono tracking-widest text-slate-700 font-semibold">{value}</span>
        </div>
      );
    };

    // --- Main Application Component ---
    function DocumentSystem() {
      // States
      const [users, setUsers] = useState(fallbackUsers);
      const [documents, setDocuments] = useState(fallbackDocuments);
      const [notifications, setNotifications] = useState(fallbackNotifications);
      const [firebaseError, setFirebaseError] = useState(null); // เก็บสถานะ Error ของ Firebase
      
      const [currentUser, setCurrentUser] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [searchQuery, setSearchQuery] = useState('');
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      const [isLoading, setIsLoading] = useState(true);
      
      // Form & Modals State
      const [showForm, setShowForm] = useState(false);
      const [formType, setFormType] = useState('in');
      const [selectedPrefix, setSelectedPrefix] = useState('จต.');
      const [selectedDoc, setSelectedDoc] = useState(null);
      const [expandedRows, setExpandedRows] = useState([]);
      const [showImportModal, setShowImportModal] = useState(false);
      const [importData, setImportData] = useState('');
      const [parsedImport, setParsedImport] = useState([]);
      const [importPrefix, setImportPrefix] = useState('จต.');
      const [showNotifMenu, setShowNotifMenu] = useState(false);
      const [showUserModal, setShowUserModal] = useState(false);
      const [editingUser, setEditingUser] = useState(null);

      // --- Firebase Data Fetching ---
      useEffect(() => {
        let unsubDocs, unsubUsers, unsubNotifs;

        const initFirebase = async () => {
          try {
            // รอให้ SignIn สำเร็จก่อน
            await auth.signInAnonymously();

            // ดึง Documents
            unsubDocs = db.collection("documents").onSnapshot(
              snapshot => {
                const docsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                docsData.sort((a, b) => new Date(b.date) - new Date(a.date));
                setDocuments(docsData.length > 0 ? docsData : fallbackDocuments); // ถ้าว่างให้ใช้ mock
                setFirebaseError(null); // รีเซ็ต error
              },
              error => {
                console.error("Documents Snapshot Error:", error);
                setFirebaseError("ไม่สามารถเชื่อมต่อฐานข้อมูลได้ (Permission Denied) กำลังใช้ข้อมูลจำลองแทน");
              }
            );

            // ดึง Users
            unsubUsers = db.collection("users").onSnapshot(
              snapshot => {
                const usersData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                setUsers(usersData.length > 0 ? usersData : fallbackUsers);
                setIsLoading(false);
              },
              error => {
                console.error("Users Snapshot Error:", error);
                setIsLoading(false);
              }
            );

            // ดึง Notifications
            unsubNotifs = db.collection("notifications").onSnapshot(
              snapshot => {
                const notifsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                notifsData.sort((a, b) => new Date(b.date) - new Date(a.date));
                setNotifications(notifsData.length > 0 ? notifsData : fallbackNotifications);
              },
              error => {
                console.error("Notifications Snapshot Error:", error);
              }
            );

          } catch (err) {
            console.error("Firebase Init Error:", err);
            setFirebaseError("เกิดข้อผิดพลาดในการเชื่อมต่อ Firebase");
            setIsLoading(false);
          }
        };

        initFirebase();

        return () => {
          if (unsubDocs) unsubDocs();
          if (unsubUsers) unsubUsers();
          if (unsubNotifs) unsubNotifs();
        };
      }, []);

      // Role Logic
      const isAdmin = currentUser && currentUser.role === 'admin';
      
      const TEMPLES = useMemo(() => users.filter(u => u.role === 'temple').map(u => u.temple), [users]);

      // Notifications
      const myNotifications = useMemo(() => {
        if (!currentUser) return [];
        return notifications
          .filter(n => n.target === 'all' || n.target === currentUser.temple)
          .sort((a, b) => new Date(b.date) - new Date(a.date));
      }, [notifications, currentUser]);
      
      const unreadCount = myNotifications.filter(n => !n.isRead).length;

      const markAllAsRead = () => {
        if(firebaseError) {
          // ถ้ามี Error แปลว่าใช้ Mock data, อัปเดตใน state แทน
          setNotifications(notifications.map(n => 
            (n.target === 'all' || n.target === currentUser.temple) ? { ...n, isRead: true } : n
          ));
        } else {
          myNotifications.forEach(n => {
            if (!n.isRead) {
              db.collection("notifications").doc(n.id).update({ isRead: true }).catch(e => console.error(e));
            }
          });
        }
        setShowNotifMenu(false);
      };

      // Documents Logic
      const accessibleDocuments = useMemo(() => {
        if (!currentUser) return [];
        if (isAdmin) return documents;
        return documents.filter(doc => 
          doc.sender === currentUser.temple || 
          (doc.receivers && (doc.receivers.includes(currentUser.temple) || doc.receivers.includes('ทุกวัดในเขตตำบล')))
        );
      }, [documents, currentUser, isAdmin]);

      const toggleRow = (id) => {
        setExpandedRows(prev => prev.includes(id) ? prev.filter(rowId => rowId !== id) : [...prev, id]);
      };

      const handleUpdateStatus = async (id, newStatus) => {
        if(firebaseError) {
          setDocuments(documents.map(doc => doc.id === id ? { ...doc, status: newStatus } : doc));
          setSelectedDoc(prev => ({ ...prev, status: newStatus }));
          return;
        }

        try {
          await db.collection("documents").doc(id).update({ status: newStatus });
          setSelectedDoc(prev => ({ ...prev, status: newStatus }));
        } catch (error) {
          console.error("Error updating status:", error);
          alert("ไม่สามารถอัปเดตสถานะได้ (กรุณาตั้งค่า Firestore Rules)");
        }
      };

      const getNextDocNumber = (prefix) => {
        const thaiYear = new Date().getFullYear() + 543;
        const typeDocs = documents.filter(d => d.docNumber && d.docNumber.startsWith(`${prefix}${thaiYear}-`));
        const nextNumber = typeDocs.length + 1;
        return `${prefix}${thaiYear}-${nextNumber.toString().padStart(5, '0')}`;
      };

      const handleSaveDocument = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const attachmentName = formData.get('attachment') ? formData.get('attachment').name : '';
        const receiverValue = formData.get('receiver');
        const receivers = receiverValue === 'all' ? ['ทุกวัดในเขตตำบล'] : [receiverValue];

        const newDoc = {
          docPrefix: selectedPrefix,
          docNumber: getNextDocNumber(selectedPrefix),
          originalDocNumber: formData.get('originalDocNumber'),
          title: formData.get('title'),
          sender: currentUser.temple,
          receivers: receivers,
          date: formData.get('date'),
          status: formData.get('status'),
          attachment: attachmentName,
          note: formData.get('note'),
        };

        if(firebaseError) {
           // กรณีเชื่อม DB ไม่ได้ ให้เซฟลง State แบบจำลองไปก่อน
           const newId = Date.now().toString();
           setDocuments([{ id: newId, ...newDoc }, ...documents]);
           
           const newNotifs = receivers.map((r, i) => ({
            id: `notif-${Date.now()}-${i}`,
            target: r === 'ทุกวัดในเขตตำบล' ? 'all' : r,
            message: `มีหนังสือใหม่: ${newDoc.title} (จาก ${newDoc.sender})`,
            date: new Date().toISOString().split('T')[0],
            isRead: false
          }));
          setNotifications([...newNotifs, ...notifications]);

           setShowForm(false);
           setActiveTab('outgoing');
           return;
        }
        
        try {
          await db.collection("documents").add({
            ...newDoc,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
          
          receivers.forEach(async (r) => {
            await db.collection("notifications").add({
              target: r === 'ทุกวัดในเขตตำบล' ? 'all' : r,
              message: `มีหนังสือใหม่: ${newDoc.title} (จาก ${newDoc.sender})`,
              date: new Date().toISOString().split('T')[0],
              isRead: false,
              timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
          });

          setShowForm(false);
          setActiveTab('outgoing');
        } catch (error) {
          console.error("Error saving doc:", error);
          alert("เกิดข้อผิดพลาดในการบันทึกข้อมูลลงฐานข้อมูล กรุณาตรวจสอบ Firestore Rules");
        }
      };

      const handleSaveUser = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const userData = {
          username: formData.get('username'),
          password: formData.get('password'),
          role: formData.get('role'),
          temple: formData.get('temple'),
          name: formData.get('name'),
          position: formData.get('position')
        };
        
        if(firebaseError) {
          if (editingUser) {
            setUsers(users.map(u => u.id === editingUser.id ? { ...u, ...userData } : u));
          } else {
            setUsers([...users, { id: 'u' + Date.now(), ...userData }]);
          }
          setShowUserModal(false);
          setEditingUser(null);
          return;
        }

        try {
          if (editingUser) {
            await db.collection("users").doc(editingUser.id).update(userData);
          } else {
            await db.collection("users").add(userData);
          }
          setShowUserModal(false);
          setEditingUser(null);
        } catch (error) {
          console.error("Error saving user:", error);
          alert("เกิดข้อผิดพลาดในการบันทึกบัญชี กรุณาตรวจสอบ Firestore Rules");
        }
      };
      
      const openEditUser = (user) => {
        setEditingUser(user);
        setShowUserModal(true);
      };

      const closeUserModal = () => {
        setShowUserModal(false);
        setEditingUser(null);
      };

      const deleteUser = async (id) => {
        if(window.confirm('ยืนยันการลบบัญชีผู้ใช้นี้? วัดนี้จะไม่สามารถเข้าสู่ระบบได้อีก')) {
          if(firebaseError){
             setUsers(users.filter(u => u.id !== id));
             return;
          }
          try{
             await db.collection("users").doc(id).delete();
          } catch(e) { alert("ไม่สามารถลบได้ ติด Permission Error"); }
        }
      };

      const deleteDocument = async (id) => {
        if(window.confirm('คุณต้องการลบหนังสือฉบับนี้ใช่หรือไม่? (การกระทำนี้ลบออกจากระบบกลาง)')) {
          if(firebaseError){
             setDocuments(documents.filter(d => d.id !== id));
             setSelectedDoc(null);
             return;
          }
          try{
             await db.collection("documents").doc(id).delete();
             setSelectedDoc(null);
          } catch(e) { alert("ไม่สามารถลบได้ ติด Permission Error"); }
        }
      };

      const filteredDocs = accessibleDocuments.filter(doc => {
        const recs = doc.receivers || [];
        const isIncoming = recs.includes(currentUser.temple) || recs.includes('ทุกวัดในเขตตำบล') || (isAdmin && doc.sender !== currentUser.temple);
        const isOutgoing = doc.sender === currentUser.temple;
        const matchesTab = activeTab === 'dashboard' || (activeTab === 'incoming' && isIncoming) || (activeTab === 'outgoing' && isOutgoing);
        const matchesSearch = (doc.title || '').toLowerCase().includes(searchQuery.toLowerCase()) || 
                              (doc.docNumber || '').toLowerCase().includes(searchQuery.toLowerCase()) || 
                              (doc.sender || '').toLowerCase().includes(searchQuery.toLowerCase());
        return matchesTab && matchesSearch;
      });

      const stats = {
        total: accessibleDocuments.length,
        in: accessibleDocuments.filter(doc => (doc.receivers || []).includes(currentUser?.temple) || (doc.receivers || []).includes('ทุกวัดในเขตตำบล') || (isAdmin && doc.sender !== currentUser?.temple)).length,
        out: accessibleDocuments.filter(doc => doc.sender === currentUser?.temple).length,
        pending: accessibleDocuments.filter(d => d.status === 'pending').length,
      };

      const getStatusBadge = (status) => {
        switch(status) {
          case 'completed': return <span className="px-2.5 py-1 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-full text-xs font-medium flex items-center shadow-sm w-fit"><i className="ph-fill ph-check-circle mr-1"></i> เสร็จสิ้น</span>;
          case 'processing': return <span className="px-2.5 py-1 bg-blue-50 text-blue-700 border border-blue-200 rounded-full text-xs font-medium flex items-center shadow-sm w-fit"><i className="ph-fill ph-clock mr-1"></i> กำลังดำเนินการ</span>;
          case 'pending': return <span className="px-2.5 py-1 bg-amber-50 text-amber-700 border border-amber-200 rounded-full text-xs font-medium flex items-center shadow-sm w-fit"><i className="ph-fill ph-warning-circle mr-1"></i> รอดำเนินการ</span>;
          default: return null;
        }
      };

      const handleParseExcel = (e) => {
        const text = e.target.value;
        setImportData(text);
        if (!text.trim()) { setParsedImport([]); return; }
        const rows = text.trim().split('\n');
        const parsed = rows.map((row, index) => {
          const cols = row.split('\t');
          let rawStatus = (cols[4] || '').trim();
          let mappedStatus = 'pending';
          if (rawStatus === 'เสร็จสิ้น' || rawStatus.toLowerCase() === 'completed') mappedStatus = 'completed';
          else if (rawStatus === 'กำลังดำเนินการ' || rawStatus.toLowerCase() === 'processing') mappedStatus = 'processing';
          return {
            id: `temp-${index}`,
            originalDocNumber: cols[0]?.trim() || '-',
            date: cols[1]?.trim() || new Date().toISOString().split('T')[0],
            title: cols[2]?.trim() || 'ไม่มีชื่อเรื่อง',
            receiver: cols[3]?.trim() || 'ไม่ระบุ',
            status: mappedStatus,
            statusText: rawStatus || 'รอดำเนินการ',
            attachment: cols[5]?.trim() || '',
            note: cols[6]?.trim() || ''
          };
        });
        setParsedImport(parsed);
      };

      const handleSaveImport = async () => {
        if (parsedImport.length === 0) return;
        
        if(firebaseError){
           // จำลองการเซฟลง state
           let currentDocs = [...documents];
           parsedImport.forEach((item, index) => {
             const thaiYear = new Date().getFullYear() + 543;
             const typeDocs = currentDocs.filter(d => d.docNumber && d.docNumber.startsWith(`${importPrefix}${thaiYear}-`));
             const nextNumber = typeDocs.length + 1;
             const sysDocNum = `${importPrefix}${thaiYear}-${nextNumber.toString().padStart(5, '0')}`;
             const newDoc = {
               id: Date.now().toString() + '-' + index,
               docPrefix: importPrefix, docNumber: sysDocNum, originalDocNumber: item.originalDocNumber,
               title: item.title, sender: currentUser.temple, receivers: [item.receiver],
               date: item.date, status: item.status, attachment: item.attachment, note: item.note
             };
             currentDocs = [newDoc, ...currentDocs];
          });
          setDocuments(currentDocs);
          setShowImportModal(false);
          setImportData('');
          setParsedImport([]);
          setActiveTab('outgoing');
          return;
        }

        try {
          const snapshot = await db.collection("documents").get();
          const currentDocsData = snapshot.docs.map(doc => doc.data());
          const thaiYear = new Date().getFullYear() + 543;
          let currentTypeDocsCount = currentDocsData.filter(d => d.docNumber && d.docNumber.startsWith(`${importPrefix}${thaiYear}-`)).length;

          const batch = db.batch();

          parsedImport.forEach((item) => {
             currentTypeDocsCount++;

               status: item.status,
               attachment: item.attachment,
               note: item.note,
               timestamp: firebase.firestore.FieldValue.serverTimestamp()
             });

    const StatCard = ({ title, value, icon, bg, color, borderColor }) => (
      <div className={`bg-white p-6 rounded-2xl shadow-sm border ${borderColor} flex items-center hover:shadow-md transition-shadow`}>
        <div className={`p-4 rounded-xl ${bg} mr-4`}>
           <i className={`ph-fill ${icon} text-2xl ${color}`}></i>
        </div>
        <div>
          <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">{title}</p>
          <p className="text-3xl font-black text-slate-800 tracking-tight">{value}</p>
        </div>
      </div>
    );

    // --- Login Screen ---
    const LoginScreen = ({ onLogin, users, firebaseError }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleLogin = (e) => {
        e.preventDefault();
        const user = users.find(u => u.username === username && u.password === password);
        if (user) onLogin(user); else setError('ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง');
      };

      return (
        <div className="flex h-screen items-center justify-center bg-gradient-to-br from-slate-100 to-slate-200 font-sarabun p-4">
          <div className="bg-white p-8 md:p-12 rounded-[2rem] shadow-2xl w-full max-w-[420px] border border-white relative overflow-hidden">
            <div className="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-blue-600 to-indigo-600"></div>

            <div className="text-center mb-10 mt-2">
              <div className="w-20 h-20 bg-gradient-to-br from-blue-50 to-indigo-100 text-blue-700 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-inner border border-blue-100">
                <i className="ph-fill ph-house text-4xl"></i>
              </div>
              <h2 className="text-2xl font-black text-slate-800 tracking-tight">ระบบสารบรรณ</h2>
              <p className="text-blue-600 font-bold text-sm mt-1">{DISTRICT_NAME}</p>
            </div>
            
            {firebaseError && <div className="bg-amber-50 text-amber-700 p-3 rounded-xl text-xs mb-4 text-center border border-amber-200 font-medium">{firebaseError}</div>}
            {error && <div className="bg-red-50 text-red-600 p-3.5 rounded-xl text-sm mb-6 text-center border border-red-100 font-bold shadow-sm">{error}</div>}
            
            <form onSubmit={handleLogin} className="space-y-5">
              <div>
                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">ชื่อผู้ใช้งาน</label>
                <div className="relative">
                  <i className="ph-fill ph-user absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 text-lg"></i>
                  <input type="text" className="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium text-slate-800" value={username} onChange={(e) => setUsername(e.target.value)} required />
                </div>
              </div>
              <div>
                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">รหัสผ่าน</label>
                <div className="relative">
                  <i className="ph-fill ph-lock-key absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 text-lg"></i>
                  <input type="password" className="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium text-slate-800" value={password} onChange={(e) => setPassword(e.target.value)} required />
                </div>
              </div>
              <button type="submit" className="w-full bg-blue-600 text-white py-3.5 rounded-xl hover:bg-blue-700 transition-all font-bold text-base mt-6 shadow-lg shadow-blue-600/30 hover:shadow-blue-600/40">เข้าสู่ระบบส่วนกลาง</button>
            </form>
            
            <div className="mt-10 pt-6 border-t border-slate-100">
              <p className="text-[10px] text-slate-400 font-bold mb-3 uppercase tracking-widest text-center">บัญชีระบบ</p>
              <div className="space-y-2 max-h-36 overflow-y-auto pr-1 custom-scrollbar">
                {users.map(u => (
                  <div key={u.id} className="flex justify-between items-center bg-slate-50/80 p-2.5 rounded-lg border border-slate-100">
                    <div className="flex flex-col">
                      <span className="text-sm font-bold text-slate-700">{u.username}</span>
                      <span className={`text-[9px] font-bold uppercase tracking-wider mt-0.5 ${u.role === 'admin' ? 'text-indigo-600' : 'text-slate-500'}`}>{u.role}</span>
                    </div>
                    <div className="flex flex-col items-end">
                      <span className="text-xs text-slate-600 font-bold">{u.temple}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DocumentSystem />);
  </script>
</body>
</html>
